<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>微光集</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0f0e17;
    color: #e6dfcc;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
    min-height: 100dvh;
    overflow-x: hidden;
  }
  .app {
    max-width: 480px;
    margin: 0 auto;
    padding: 24px 20px 40px;
    display: flex;
    flex-direction: column;
    min-height: 100dvh;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #d4a853;
  }
  .header .date {
    font-size: 13px;
    color: #8a8a8a;
  }
  .subtitle {
    font-size: 13px;
    color: #5a5a5a;
    margin-bottom: 24px;
    line-height: 1.5;
  }
  .add-row {
    display: flex;
    gap: 10px;
    margin-bottom: 28px;
  }
  .add-row input {
    flex: 1;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 10px;
    padding: 12px 16px;
    color: #e6dfcc;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }
  .add-row input:focus {
    border-color: rgba(212,168,83,0.4);
  }
  .add-row input::placeholder { color: #4a4a4a; }
  .add-row button {
    background: rgba(212,168,83,0.12);
    border: 1px solid rgba(212,168,83,0.2);
    color: #d4a853;
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .add-row button:active { background: rgba(212,168,83,0.2); }
  .items {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.03);
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.3s;
    cursor: pointer;
  }
  .item.done { opacity: 0.55; border-color: transparent; }
  .item .star {
    width: 22px; height: 22px; flex-shrink: 0;
    border-radius: 50%;
    border: 1.5px solid rgba(212,168,83,0.3);
    transition: all 0.4s ease;
  }
  .item.done .star {
    background: radial-gradient(circle at 45% 40%, #f5d78c, #d4a853 60%, #a07828);
    border-color: #d4a853;
    box-shadow: 0 0 12px rgba(212,168,83,0.35), 0 0 3px rgba(212,168,83,0.25);
  }
  .item .text { flex: 1; font-size: 15px; color: #c4bcaa; transition: all 0.3s; }
  .item.done .text { color: #6a6a6a; text-decoration: line-through; text-decoration-color: rgba(212,168,83,0.25); }
  .item .time { font-size: 11px; color: #4a4a4a; flex-shrink: 0; }
  .item.done .time { color: #5a4a30; }
  .item .delete {
    width: 28px; height: 28px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 8px; font-size: 13px;
    color: transparent; transition: all 0.2s; flex-shrink: 0;
  }
  .item:hover .delete { color: #5a3a3a; }
  .item .delete:active { background: rgba(255,80,60,0.12); color: #d44; }
  .footer {
    margin-top: 24px;
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,0.04);
  }
  .footer .count { font-size: 13px; color: #5a5a5a; }
  .footer .count strong { color: #d4a853; font-weight: 500; }
  .footer .clear {
    font-size: 12px; color: #4a4a4a;
    background: none; border: none; cursor: pointer;
    padding: 6px 10px; border-radius: 6px; transition: all 0.2s;
  }
  .footer .clear:hover { color: #8a6a5a; background: rgba(255,255,255,0.03); }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>✦ 微光集</h1>
    <span class="date" id="todayDate"></span>
  </div>
  <p class="subtitle">每件小事都是一点微光。<br>汇集起来，就是你的星空。</p>

  <div class="add-row">
    <input type="text" id="input" placeholder="添加一件事…" maxlength="80" autocomplete="off">
    <button id="addBtn">+ 微光</button>
  </div>

  <div class="items" id="items"></div>

  <div class="footer">
    <span class="count" id="count"></span>
    <button class="clear" id="clearBtn">清除已完成</button>
  </div>
</div>

<script>
const STORAGE_KEY = 'lightlet_items_v1';

function today() {
  return new Date().toLocaleDateString('zh-CN', { month:'long', day:'numeric', weekday:'short' });
}
function now() {
  return new Date().toLocaleTimeString('zh-CN', { hour:'2-digit', minute:'2-digit' });
}
function load() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]'); } catch { return []; }
}
function save(items) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(items));
}

function render() {
  const items = load();
  const container = document.getElementById('items');
  const countEl = document.getElementById('count');
  const done = items.filter(i => i.done).length;

  container.innerHTML = items.map((item, idx) => `
    <div class="item${item.done ? ' done' : ''}" data-idx="${idx}">
      <div class="star" data-action="toggle"></div>
      <span class="text">${esc(item.text)}</span>
      <span class="time">${item.time || ''}</span>
      <div class="delete" data-action="delete">×</div>
    </div>
  `).join('') || '<div style="text-align:center;color:#3a3a3a;padding:40px 0;font-size:14px;">还没有微光，添加第一件事吧</div>';

  countEl.innerHTML = `今日微光 <strong>${done}</strong> / ${items.length}`;
  document.getElementById('todayDate').textContent = today();
}

function esc(s) {
  const div = document.createElement('div');
  div.textContent = s;
  return div.innerHTML;
}

document.getElementById('addBtn').addEventListener('click', () => {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;
  const items = load();
  items.push({ text, time: now(), done: false, created: Date.now() });
  save(items);
  input.value = '';
  render();
});
document.getElementById('input').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') document.getElementById('addBtn').click();
});
document.getElementById('items').addEventListener('click', (e) => {
  const action = e.target.dataset.action;
  const row = e.target.closest('.item');
  if (!row) return;
  const idx = parseInt(row.dataset.idx);
  const items = load();
  if (action === 'toggle') {
    items[idx].done = !items[idx].done;
    if (items[idx].done) items[idx].completedTime = now();
    save(items);
    render();
  } else if (action === 'delete') {
    items.splice(idx, 1);
    save(items);
    render();
  }
});
document.getElementById('clearBtn').addEventListener('click', () => {
  const items = load().filter(i => !i.done);
  save(items);
  render();
});
render();
</script>
</body>
</html>
