<html lang="zh-CN">

  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet" />
  <title>微光集 · Lightlet</title>
  <style>
    :root{--ink:#263238;--paper:#ecedeb;--gold:#f47a24;--gold2:#ffd36a;--night:#14283a;--night2:#17304a;--blue:#69a6cf;--muted:#849098;--ease:cubic-bezier(.22,.8,.25,1)}

    .app{position:relative;width:100vw;width:100dvw;height:var(--app-height,100dvh);min-height:-webkit-fill-available;margin:0;overflow:hidden;background:#14283a url('public/lightlet-night-bg.png') center bottom/cover no-repeat;transition:color .28s}
    .app.day{--ink:#263238;--muted:#778081;background:#ecedeb;color:var(--ink)}
    .shell{position:relative;z-index:2;width:100%;height:100%;min-height:0;padding:calc(14px + env(safe-area-inset-top)) max(22px,env(safe-area-inset-left)) calc(106px + env(safe-area-inset-bottom)) max(22px,env(safe-area-inset-right));display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center}.brand b{font-size:21px;letter-spacing:.04em;font-weight:400}.brand small,.brand-mark{display:none}
    .mode-switch{position:relative;display:flex;width:92px;height:38px;padding:4px;border:2px solid rgba(242,240,231,.58);border-radius:20px;background:#17304a}
    .day .mode-switch{border-color:rgba(20,30,35,.13);background:rgba(0,0,0,.035)}
    .mode-switch button{z-index:1;flex:1;border:0;background:none;cursor:pointer;opacity:.48;display:grid;place-items:center}.mode-switch button.active{opacity:1}.mode-icon{position:relative;display:block;width:21px;height:19px}.icon-night:before{content:"";position:absolute;left:2px;bottom:2px;width:0;height:0;border-left:8px solid transparent;border-right:8px solid transparent;border-bottom:11px solid #f2f0e7;filter:drop-shadow(4px 2px 0 rgba(71,123,149,.8))}.icon-night:after{content:"✦";position:absolute;right:-1px;top:-5px;color:#ffd36a;font-size:9px}.icon-cloud:before{content:"";position:absolute;left:1px;top:3px;width:5px;height:5px;border-radius:50%;background:currentColor;box-shadow:7px -2px 0 currentColor,14px 2px 0 currentColor,5px 9px 0 currentColor,13px 10px 0 currentColor}.icon-cloud:after{content:"";position:absolute;left:4px;top:7px;width:13px;height:7px;border:1.5px solid currentColor;border-width:0 0 1.5px 1.5px;border-radius:0 0 0 8px;transform:rotate(-8deg)}
    .switch-pill{position:absolute;top:3px;left:3px;width:41px;height:28px;border-radius:16px;background:#477b95;transition:transform .35s var(--ease)}.day .switch-pill{transform:translateX(41px);background:#69a6cf}
    .time-filter{display:flex;align-items:center;gap:8px;margin-top:27px}.time-filter button{border:0;background:none;cursor:pointer;color:var(--gold);padding:7px;font-size:18px}.day .time-filter button{color:#625f58}.date{min-width:130px;text-align:center;color:var(--gold);font-size:15px;line-height:1.2;letter-spacing:.08em}.day .date{color:#777369}.all-time{border:1px solid rgba(255,255,255,.12)!important;border-radius:14px!important;padding:7px 11px!important;font-size:13px!important;letter-spacing:.04em}.day .all-time{border-color:rgba(20,30,35,.12)!important}
    .canvas{position:relative;flex:1;min-height:0;margin:2px -22px 0;overflow:hidden}.day .canvas{touch-action:none;cursor:grab}.day .canvas:active{cursor:grabbing}.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}.particle{position:absolute;border-radius:50%;background:#ffd36a;opacity:.18;box-shadow:0 0 3px rgba(255,211,106,.25);animation:particleFloat var(--dur) ease-in-out infinite alternate}.day .particle{background:#697476;opacity:.09;box-shadow:none;filter:blur(.55px)}
    .stars,.threads{position:absolute;inset:0;transform-origin:0 0;will-change:transform;transition:opacity .28s,transform .72s var(--ease)}.threads{opacity:0}.threads.interacting{transition:none}.day .stars{opacity:0;pointer-events:none}.day .threads{opacity:1}.thread-lines{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}.thread-lines line{stroke:#263238;stroke-width:1;opacity:.48;vector-effect:non-scaling-stroke}.thread-lines line.faded{stroke:#9da5a6;stroke-dasharray:5 5;opacity:.48}.thread-lines line.cluster-link{stroke:#aeb5b5;stroke-dasharray:2 7;opacity:.22}
    .star{position:absolute;width:50px;height:50px;transform:translate(-50%,-50%);border:0;background:transparent!important;box-shadow:none!important;cursor:pointer;display:grid;place-items:center;animation:arrive .55s var(--ease) both;transition:opacity .5s}
    .star:before{content:"✦";display:block;width:auto;height:auto;background:none!important;color:#8192a0;font-size:var(--star-size,14px);line-height:1;text-shadow:0 0 8px rgba(165,171,167,.25);transition:.4s var(--ease);animation:twinkle 2.8s ease-in-out infinite}.star.done:before{background:none!important;color:var(--gold2);font-size:var(--star-size,18px);text-shadow:0 0 6px #ffd36a,0 0 18px rgba(255,211,106,.65),0 0 34px rgba(244,122,36,.28);animation:twinkleBright 2.4s ease-in-out infinite}.star.expired:before{opacity:.38}
    .star span{position:absolute;top:35px;white-space:nowrap;font-size:11px;letter-spacing:.04em;color:#aeb5b4;opacity:.72}.star.done span{color:#f5dcaf;opacity:.95}
    .star.selected:after{content:"";position:absolute;width:40px;height:40px;border:1px solid rgba(255,217,154,.35);border-radius:50%;animation:ripple 1.7s infinite}
    .node{position:absolute;width:74px;height:74px;border:0;background:transparent!important;box-shadow:none!important;outline:none!important;transform:translate(-50%,-50%);cursor:pointer;transition:opacity .5s}.node:before{content:"";position:absolute;left:31px;top:31px;width:12px;height:12px;border-radius:50%;background:#263238}.node.pending:before{left:30px;top:30px;width:14px;height:14px;background:transparent;border:2px dashed #9da5a6}.node.expired:before{width:10px;height:10px;left:32px;top:32px;background:#aeb5b5}.node span{position:absolute;z-index:1;top:48px;left:50%;transform:translateX(-50%);white-space:nowrap;font-size:14px;line-height:1.2;color:#263238;transition:opacity .25s}.node.pending span,.node.expired span{color:#858e90}.node.selected:after{content:"";position:absolute;left:23px;top:23px;width:28px;height:28px;border:2px solid #f47a24;border-radius:50%}.star.out-of-focus,.node.out-of-focus{opacity:.1}.threads.dense .node span{opacity:0}.threads.dense .node.selected span{opacity:1}
    .empty{position:absolute;inset:80px 35px auto;text-align:center;color:var(--muted);font-size:13px;line-height:2;display:none}.empty.show{display:block}.empty .orb{width:44px;height:44px;margin:0 auto 15px;border:1px solid currentColor;border-radius:50%;opacity:.25}
    .bottom{position:absolute;z-index:5;left:max(18px,env(safe-area-inset-left));right:max(18px,env(safe-area-inset-right));bottom:calc(12px + env(safe-area-inset-bottom));height:70px;display:flex;align-items:center;gap:8px;padding:0 10px 0 20px;border:1px solid rgba(255,255,255,.12);border-radius:24px;background:rgba(19,29,37,.76);backdrop-filter:blur(18px);box-shadow:0 12px 40px rgba(0,0,0,.25)}
    .day .bottom{background:#fff;border-color:rgba(38,50,56,.12);box-shadow:0 8px 26px rgba(36,42,40,.1)}
    .quick-input{flex:1;min-width:0;height:50px;border:0;background:none;color:inherit;outline:none;font-size:16px}.quick-input::placeholder{color:currentColor;opacity:.4;font-size:14px}
    .add{width:50px;height:50px;border:0;border-radius:50%;background:var(--gold);color:#fff8e7;font-size:29px;line-height:1;cursor:pointer;box-shadow:0 5px 16px rgba(244,122,36,.28);transition:transform .2s}.add:active{transform:scale(.91)}
    .zoom-reset{position:absolute;z-index:4;right:20px;bottom:94px;display:none;border:2px solid #263238;border-radius:18px;padding:8px 13px;background:#ecedeb;color:#263238;font-size:13px;line-height:1;box-shadow:2px 3px 0 rgba(38,50,56,.18)}.day .zoom-reset{display:block}
    .campfire-live{position:absolute;z-index:1;left:var(--fire-x,52.2%);top:var(--fire-y,76%);width:42px;height:54px;transform:translateX(-50%);pointer-events:none;filter:drop-shadow(0 1px 2px rgba(35,18,8,.22));transition:opacity .35s}.day .campfire-live{opacity:0}.campfire-live:before{content:"";position:absolute;left:50%;bottom:-4px;width:126px;height:78px;transform:translateX(-50%);border-radius:50%;background:radial-gradient(ellipse,rgba(255,157,48,.28) 0,rgba(244,122,36,.1) 38%,transparent 72%);animation:fireGlow 2.1s ease-in-out infinite}.flame{position:absolute;left:11px;bottom:9px;width:21px;height:31px;border-radius:48% 52% 52% 48%/64% 62% 38% 36%;background:rgba(244,122,36,.9);transform-origin:50% 100%;transform:rotate(3deg);animation:flameDance .85s ease-in-out infinite alternate}.flame:after{content:"";position:absolute;left:6px;bottom:3px;width:10px;height:18px;border-radius:50% 50% 55% 45%;background:#ffd36a;animation:flameInner .7s ease-in-out infinite alternate}
    .sheet-wrap{position:absolute;z-index:9;inset:0;background:rgba(3,9,13,.45);backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:.3s}.sheet-wrap.open{opacity:1;pointer-events:auto}
    .sheet{position:absolute;left:0;right:0;bottom:0;padding:25px 22px calc(24px + env(safe-area-inset-bottom));border-radius:30px 30px 0 0;background:#f4f0e7;color:#182124;transform:translateY(100%);transition:.45s var(--ease)}.open .sheet{transform:none}.handle{width:38px;height:3px;margin:-11px auto 24px;border-radius:2px;background:#cbc6ba}
    .sheet h2{margin:0;font-size:23px;font-weight:400}.sheet p{font-size:12px;color:#77766f;margin:8px 0 23px}.input-row{display:flex;gap:9px}.input-row input{min-width:0;flex:1;padding:0 16px;height:51px;border:1px solid #d9d4c8;border-radius:16px;background:#fffdf8;outline:none;font-size:16px}.input-row input:focus{border-color:#b99968}.save{width:76px;border:0;border-radius:16px;background:#172126;color:#fff7e9;cursor:pointer}.suggestions{display:flex;gap:8px;overflow:auto;margin-top:15px;padding-bottom:3px}.suggestions button{white-space:nowrap;padding:9px 12px;border:1px solid #d7d1c5;border-radius:14px;background:none;color:#5f625e;font-size:11px;cursor:pointer}
    .actions{position:absolute;z-index:7;left:50%;bottom:99px;transform:translate(-50%,15px);display:flex;gap:7px;padding:7px;border-radius:18px;background:rgba(8,14,18,.82);backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:.25s}.actions.show{opacity:1;pointer-events:auto;transform:translate(-50%,0)}.day .actions{background:rgba(32,36,35,.88)}.actions button{border:0;border-radius:12px;padding:9px 12px;background:rgba(255,255,255,.08);font-size:11px;cursor:pointer}.actions .shine{color:#ffd693}.toast{position:absolute;z-index:12;left:50%;top:45%;transform:translate(-50%,-50%) scale(.8);padding:13px 18px;border:1px solid rgba(255,220,160,.25);border-radius:18px;background:rgba(13,22,28,.76);backdrop-filter:blur(12px);font-size:12px;letter-spacing:.08em;opacity:0;pointer-events:none}.toast.go{animation:toast 1.8s var(--ease)}
    @keyframes arrive{from{opacity:0;transform:translate(-50%,-40%) scale(.7)}}@keyframes ripple{to{transform:scale(1.6);opacity:0}}@keyframes twinkle{50%{opacity:.45;transform:scale(.72);text-shadow:0 0 4px rgba(165,171,167,.16)}}@keyframes twinkleBright{50%{transform:scale(1.25);text-shadow:0 0 9px #ffd36a,0 0 25px rgba(255,211,106,.72),0 0 42px rgba(244,122,36,.34)}}@keyframes particleFloat{to{transform:translate(var(--dx),var(--dy));opacity:.28}}@keyframes fireGlow{50%{opacity:.62;transform:translateX(-50%) scale(1.12)}}@keyframes flameDance{0%{transform:rotate(-5deg) scale(.92,1.04)}100%{transform:rotate(7deg) scale(1.05,.93)}}@keyframes flameInner{to{transform:translateY(2px) scale(.86,1.08)}}@keyframes toast{15%,70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-65%) scale(.95)}}
    @media(min-width:900px){html,body{overflow:auto;background:#07131b}body{padding:28px}.app{width:min(480px,100%);height:calc(100dvh - 56px);min-height:600px;margin:auto;border-radius:34px;box-shadow:0 25px 80px #0008}}
  </style>
</head>
<body>
  <main class="app" id="app">
    <div class="campfire-live" aria-hidden="true"><i class="flame"></i></div>
    <section class="shell">
      <header>
        <div class="brand"><div><b>Lightlet</b></div></div>
        <div class="mode-switch" aria-label="视觉模式"><i class="switch-pill"></i><button id="nightBtn" class="active" aria-label="星夜模式"><i class="mode-icon icon-night"></i></button><button id="dayBtn" aria-label="脉络模式"><i class="mode-icon icon-cloud"></i></button></div>
      </header>
      <div class="time-filter"><button id="prevDate" aria-label="前一天">‹</button><button class="date" id="date">全部时光</button><button id="nextDate" aria-label="后一天">›</button><button class="all-time" id="allTime">总览</button></div><input type="date" id="datePicker" hidden>
      <div class="canvas" id="canvas"><div class="particles" id="particles"></div><div class="stars" id="stars"></div><div class="threads" id="threads"><svg class="thread-lines" id="threadLines" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><button class="zoom-reset" id="zoomReset" aria-label="回到脉络全景">全景</button><div class="empty" id="empty"><div class="orb"></div><span></span></div></div>
    </section>
    <div class="actions" id="actions"><button class="shine" id="completeAction">点亮</button><button id="archiveAction">收进记录</button><button id="deleteAction">让它离开</button></div>
    <nav class="bottom"><input class="quick-input" id="quickInput" maxlength="20" placeholder="记下一点刚刚发生的微光…"><button class="add" id="addBtn" aria-label="记下一件事">＋</button></nav>
    <div class="sheet-wrap" id="sheet"><div class="sheet"><div class="handle"></div><h2>刚刚，发生了什么？</h2><p>不必是大事。每一点微光，都算数。</p><div class="input-row"><input id="newItem" maxlength="20" placeholder="比如：晒了十分钟太阳" /><button class="save" id="saveBtn">收下</button></div><div class="suggestions"><button>好好吃了饭</button><button>回复了一条消息</button><button>出门走了走</button><button>读了几页书</button></div></div></div>
    <div class="toast" id="toast">✦　又一颗星，被你点亮了</div>
  </main>
  <script>
    const iso=d=>{const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().slice(0,10)};
    const seedData=[
      ['给绿萝浇了水','done',0],['认真吃了早餐','done',0],['读完一小章','pending',0],['和妈妈通电话','done',-1],['晒了十分钟太阳','done',0],
      ['出门散了一会步','done',-1],['整理了旧照片','expired',-3],['给朋友写封信','expired',-5],['看完一部电影','done',-2],['好好洗了个澡','done',0]
    ];
    const sample=seedData.map((x,i)=>({id:1001+i,text:x[0],status:x[1],date:iso(x[2])}));
    let stored=JSON.parse(localStorage.getItem('lightlet-items')||'null'),items=stored||sample,mode='night',filterDate=null,selected=null,visibleNodes=[],links=[];
    if(stored&&!localStorage.getItem('lightlet-seed-v3')){const personal=stored.filter(x=>!(x.id>=1001&&x.id<=1050)),existing=new Set(personal.map(x=>x.text));items=[...personal,...sample.filter(x=>!existing.has(x.text))];localStorage.setItem('lightlet-items',JSON.stringify(items))}
    localStorage.setItem('lightlet-seed-v3','1');
    items=items.map(x=>({...x,date:x.date||iso(Number.isFinite(x.day)?x.day:0)}));
    const $=s=>document.querySelector(s),app=$('#app'),canvas=$('#canvas'),stars=$('#stars'),threads=$('#threads'),lines=$('#threadLines');
    function hashValue(value){let h=2166136261;for(const c of String(value)){h^=c.charCodeAt(0);h=Math.imul(h,16777619)}return(h>>>0)/4294967295}
    function dates(){return[...new Set(items.map(x=>x.date))].sort()}
    function clusterCenter(date){const all=dates(),i=Math.max(0,all.indexOf(date)),angle=i*2.39996,r=i===0?0:17+Math.sqrt(i)*10;return{x:Math.max(13,Math.min(87,50+Math.cos(angle)*r)),y:Math.max(14,Math.min(84,48+Math.sin(angle)*r*.72))}}
    function layoutFor(item,localIndex){const center=clusterCenter(item.date),seed=hashValue(item.id+'-'+item.date),angle=seed*Math.PI*2+localIndex*2.13,r=localIndex===0?0:3.8+Math.sqrt(localIndex)*4.4+seed*2.8;return[center.x+Math.cos(angle)*r,center.y+Math.sin(angle)*r*.78,10+Math.round(hashValue(item.id+'size')*14)]}
    function persist(){localStorage.setItem('lightlet-items',JSON.stringify(items))}
    function current(){return filterDate?items.filter(x=>x.date===filterDate):items}
    function prettyDate(value){return new Intl.DateTimeFormat('zh-CN',{month:'long',day:'numeric',weekday:'short'}).format(new Date(value+'T12:00:00'))}
    function setCopy(){
      $('#date').textContent=filterDate?prettyDate(filterDate):'全部时光';
      $('#allTime').style.opacity=filterDate?'1':'.35';
    }
    function makeParticles(){
      const box=$('#particles');box.innerHTML='';for(let i=0;i<34;i++){const p=document.createElement('i');p.className='particle';const size=1+(i%5)*.65;p.style=`left:${(i*37)%97}%;top:${(i*61)%96}%;width:${size}px;height:${size}px;--dx:${(i%2?1:-1)*(5+i%7)}px;--dy:${-5-i%9}px;--dur:${3.5+i%6}s;animation-delay:${-(i%7)}s`;box.appendChild(p)}
    }
    function render(){
      setCopy();selected=null;$('#actions').classList.remove('show');const list=items,counts=new Map();stars.innerHTML='';threads.querySelectorAll('.node').forEach(n=>n.remove());lines.innerHTML='';visibleNodes=[];links=[];
      const focused=list.filter(x=>!filterDate||x.date===filterDate),empty=$('#empty');empty.classList.toggle('show',!focused.length);empty.querySelector('span').textContent='这一天还没有记录。慢慢来。';threads.classList.toggle('dense',list.length>22);
      list.forEach((item,i)=>{const local=counts.get(item.date)||0;counts.set(item.date,local+1);const [x,y,size]=layoutFor(item,local),phase=hashValue(item.id)*6.28,dim=filterDate&&item.date!==filterDate;visibleNodes.push({x,y,size,phase,item});const b=document.createElement('button');b.className=`star ${item.status}${dim?' out-of-focus':''}`;b.innerHTML=`<span>${item.text}</span>`;b.onclick=()=>select(item.id,b);stars.appendChild(b);const n=document.createElement('button');n.className=`node ${item.status}${dim?' out-of-focus':''}`;n.innerHTML=`<span>${item.text}</span>`;n.onclick=()=>select(item.id,n);threads.appendChild(n);visibleNodes[i].star=b;visibleNodes[i].node=n});
      const groups=new Map();visibleNodes.forEach((v,i)=>{if(!groups.has(v.item.date))groups.set(v.item.date,[]);groups.get(v.item.date).push(i)});const roots=[];
      for(const indices of groups.values()){roots.push(indices[0]);indices.forEach((idx,j)=>{if(!j)return;createLink(indices[Math.floor((j-1)/2)],idx,false)})}for(let i=1;i<roots.length;i++)createLink(roots[i-1],roots[i],true);
      focusCamera();startAnimation();
    }
    function createLink(a,b,cluster){const line=document.createElementNS('http://www.w3.org/2000/svg','line'),va=visibleNodes[a],vb=visibleNodes[b];if(cluster)line.classList.add('cluster-link');if(va.item.status!=='done'||vb.item.status!=='done')line.classList.add('faded');lines.appendChild(line);links.push({line,a,b})}
    function focusCamera(){if(!filterDate){stars.style.transform='translate(0,0) scale(1)';view.scale=1;view.x=0;view.y=0;applyView();return}const c=clusterCenter(filterDate),scale=1.75,x=canvas.clientWidth/2-c.x/100*canvas.clientWidth*scale,y=canvas.clientHeight/2-c.y/100*canvas.clientHeight*scale;stars.style.transform=`translate(${x}px,${y}px) scale(${scale})`;view.scale=scale;view.x=x;view.y=y;applyView()}
    let raf=0,lastFrame=0;function startAnimation(){cancelAnimationFrame(raf);lastFrame=0;raf=requestAnimationFrame(animate)}function animate(t){raf=requestAnimationFrame(animate);if(t-lastFrame<40)return;lastFrame=t;visibleNodes.forEach(v=>{const dx=Math.sin(t/2500+v.phase)*.75,dy=Math.cos(t/2900+v.phase)*.65;v.cx=v.x+dx;v.cy=v.y+dy;if(mode==='night')v.star.style.cssText=`left:${v.cx}%;top:${v.cy}%;--star-size:${v.size}px`;else v.node.style.cssText=`left:${v.cx}%;top:${v.cy}%`});if(mode==='day')links.forEach(link=>{const a=visibleNodes[link.a],b=visibleNodes[link.b];link.line.setAttribute('x1',a.cx);link.line.setAttribute('y1',a.cy);link.line.setAttribute('x2',b.cx);link.line.setAttribute('y2',b.cy)})}
    function select(id,el){selected=id;document.querySelectorAll('.selected').forEach(x=>x.classList.remove('selected'));document.querySelectorAll(`[data-id="${id}"]`).forEach(x=>x.classList.add('selected'));el.classList.add('selected');const item=items.find(x=>x.id===id);$('#completeAction').style.display=item.status==='pending'?'block':'none';$('#actions').classList.add('show')}
    function setMode(next){mode=next;app.classList.toggle('day',mode==='day');$('#nightBtn').classList.toggle('active',mode==='night');$('#dayBtn').classList.toggle('active',mode==='day');const color=mode==='day'?'#ecedeb':'#14283a';document.querySelector('meta[name="theme-color"]').content=color;document.documentElement.style.background=color;document.body.style.background=color;render()}
    function shiftDate(delta){const dates=[...new Set(items.map(x=>x.date))].sort();if(!filterDate){filterDate=delta<0?dates.at(-1):dates[0]}else{const i=dates.indexOf(filterDate),next=i+delta;if(next<0||next>=dates.length){filterDate=null}else filterDate=dates[next]}render()}
    $('#nightBtn').onclick=()=>setMode('night');$('#dayBtn').onclick=()=>setMode('day');$('#prevDate').onclick=()=>shiftDate(-1);$('#nextDate').onclick=()=>shiftDate(1);$('#allTime').onclick=()=>{filterDate=null;render()};
    $('#date').onclick=()=>{$('#datePicker').value=filterDate||iso(0);$('#datePicker').showPicker?.()};$('#datePicker').onchange=e=>{filterDate=e.target.value||null;render()};
    $('#addBtn').onclick=()=>{const quick=$('#quickInput').value.trim();if(quick){add(quick);$('#quickInput').value=''}else{$('#sheet').classList.add('open');setTimeout(()=>$('#newItem').focus(),350)}};$('#quickInput').onkeydown=e=>{if(e.key==='Enter')$('#addBtn').click()};
    $('#sheet').onclick=e=>{if(e.target.id==='sheet')$('#sheet').classList.remove('open')};document.querySelectorAll('.suggestions button').forEach(b=>b.onclick=()=>$('#newItem').value=b.textContent);
    function add(text=$('#newItem').value.trim()){if(!text)return;items.push({id:Date.now(),text,status:'pending',date:iso(0)});persist();filterDate=null;$('#newItem').value='';$('#sheet').classList.remove('open');render()}
    $('#saveBtn').onclick=()=>add();$('#newItem').onkeydown=e=>{if(e.key==='Enter')add()};
    $('#completeAction').onclick=()=>{const x=items.find(x=>x.id===selected);if(x)x.status='done';persist();render();const t=$('#toast');t.classList.remove('go');void t.offsetWidth;t.classList.add('go')};
    $('#archiveAction').onclick=()=>{const x=items.find(x=>x.id===selected);if(x)x.status='expired';persist();render()};$('#deleteAction').onclick=()=>{items=items.filter(x=>x.id!==selected);persist();render()};
    const view={scale:1,x:0,y:0},touches=new Map();let gesture=null;
    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    function applyView(){threads.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.scale})`;$('#zoomReset').textContent=view.scale===1&&view.x===0&&view.y===0?'全景':'复位'}
    function resetView(){view.scale=1;view.x=0;view.y=0;applyView()}
    function beginGesture(){const pts=[...touches.values()];if(pts.length===1){gesture={kind:'pan',p:{...pts[0]},x:view.x,y:view.y}}else if(pts.length>=2){const [a,b]=pts,mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};gesture={kind:'pinch',distance:Math.hypot(a.x-b.x,a.y-b.y),mid,scale:view.scale,x:view.x,y:view.y}}}
    canvas.addEventListener('pointerdown',e=>{if(mode!=='day'||e.target.closest('#zoomReset'))return;threads.classList.add('interacting');touches.set(e.pointerId,{x:e.clientX,y:e.clientY});canvas.setPointerCapture(e.pointerId);beginGesture()});
    canvas.addEventListener('pointermove',e=>{if(mode!=='day'||!touches.has(e.pointerId))return;touches.set(e.pointerId,{x:e.clientX,y:e.clientY});const pts=[...touches.values()];if(gesture?.kind==='pan'&&pts.length===1){view.x=gesture.x+pts[0].x-gesture.p.x;view.y=gesture.y+pts[0].y-gesture.p.y}else if(pts.length>=2){if(gesture?.kind!=='pinch')beginGesture();const [a,b]=pts,mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2},next=clamp(gesture.scale*Math.hypot(a.x-b.x,a.y-b.y)/gesture.distance,.65,2.6),ratio=next/gesture.scale;view.x=mid.x-(gesture.mid.x-gesture.x)*ratio;view.y=mid.y-(gesture.mid.y-gesture.y)*ratio;view.scale=next}applyView()});
    const endPointer=e=>{touches.delete(e.pointerId);if(!touches.size)threads.classList.remove('interacting');beginGesture()};canvas.addEventListener('pointerup',endPointer);canvas.addEventListener('pointercancel',endPointer);
    canvas.addEventListener('wheel',e=>{if(mode!=='day')return;e.preventDefault();const rect=canvas.getBoundingClientRect(),cx=e.clientX-rect.left,cy=e.clientY-rect.top,old=view.scale,next=clamp(old*(e.deltaY<0?1.1:.9),.65,2.6),ratio=next/old;view.x=cx-(cx-view.x)*ratio;view.y=cy-(cy-view.y)*ratio;view.scale=next;applyView()},{passive:false});
    $('#zoomReset').onclick=e=>{e.stopPropagation();resetView()};canvas.addEventListener('dblclick',()=>{if(mode==='day')resetView()});
    function syncViewport(){const h=window.visualViewport?.height||window.innerHeight;document.documentElement.style.setProperty('--app-height',`${Math.round(h)}px`);requestAnimationFrame(syncFire)}
    function syncFire(){const w=app.clientWidth,h=app.clientHeight,iw=941,ih=1672,scale=Math.max(w/iw,h/ih),cropX=(iw*scale-w)/2,cropY=ih*scale-h;app.style.setProperty('--fire-x',`${491*scale-cropX}px`);app.style.setProperty('--fire-y',`${1408*scale-cropY}px`)}
    syncViewport();window.visualViewport?.addEventListener('resize',syncViewport);window.addEventListener('orientationchange',()=>setTimeout(syncViewport,100));
    makeParticles();resetView();render();
  </script>
