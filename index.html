<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, minimum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#13232e" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>微光集 · Lightlet</title>
  <style>
    :root{--ink:#263238;--paper:#ecedeb;--gold:#f47a24;--gold2:#ffd36a;--night:#14283a;--night2:#17304a;--blue:#69a6cf;--muted:#849098;--ease:cubic-bezier(.22,.8,.25,1)}
    *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
    html{width:100%;height:100%;background:#13232e;overflow:hidden}
    body{margin:0;width:100%;height:100%;min-height:100%;overflow:hidden;overscroll-behavior:none;font-family:"Kaiti SC","STKaiti","Noto Sans SC",sans-serif;background:#14283a;color:#f2f0e7}
    button,input{font:inherit;touch-action:manipulation}
    button{color:inherit}
    .app{position:relative;width:100vw;width:100dvw;height:var(--app-height,100dvh);min-height:-webkit-fill-available;margin:0;overflow:hidden;background:#14283a url('public/lightlet-night-bg.png') center bottom/cover no-repeat;transition:background .6s var(--ease),color .5s}
    .app.day{--ink:#263238;--muted:#778081;background:#ecedeb;color:var(--ink)}
    .shell{position:relative;z-index:2;width:100%;height:100%;min-height:0;padding:calc(14px + env(safe-area-inset-top)) max(22px,env(safe-area-inset-left)) calc(106px + env(safe-area-inset-bottom)) max(22px,env(safe-area-inset-right));display:flex;flex-direction:column}
    header{display:flex;align-items:center;justify-content:space-between}
    .brand{display:flex;align-items:center;gap:9px}.brand-mark{width:29px;height:29px;border:2px solid rgba(255,211,106,.65);border-radius:50%;display:grid;place-items:center}
    .day .brand-mark{border-color:#263238}.brand-mark:after{content:"✦";font-size:13px;color:var(--gold2)}
    .brand b{font-size:18px;letter-spacing:.12em;font-weight:700}.brand small{display:none}
    .mode-switch{position:relative;display:flex;width:92px;height:38px;padding:4px;border:2px solid rgba(242,240,231,.58);border-radius:20px;background:#17304a}
    .day .mode-switch{border-color:rgba(20,30,35,.13);background:rgba(0,0,0,.035)}
    .mode-switch button{z-index:1;flex:1;border:0;background:none;font-size:15px;cursor:pointer;opacity:.45}.mode-switch button.active{opacity:1}
    .switch-pill{position:absolute;top:3px;left:3px;width:41px;height:28px;border-radius:16px;background:#477b95;transition:transform .35s var(--ease)}.day .switch-pill{transform:translateX(41px);background:#69a6cf}
    .time-filter{display:flex;align-items:center;gap:8px;margin-top:27px}.time-filter button{border:0;background:none;cursor:pointer;color:var(--gold);padding:7px;font:16px ui-sans-serif}.day .time-filter button{color:#625f58}.date{min-width:130px;text-align:center;color:var(--gold);font:10px/1.2 ui-sans-serif;letter-spacing:.17em;text-transform:uppercase}.day .date{color:#777369}.all-time{border:1px solid rgba(255,255,255,.12)!important;border-radius:14px!important;padding:7px 11px!important;font-size:10px!important;letter-spacing:.08em}.day .all-time{border-color:rgba(20,30,35,.12)!important}
    .canvas{position:relative;flex:1;min-height:0;margin:2px -22px 0;overflow:hidden}.day .canvas{touch-action:none;cursor:grab}.day .canvas:active{cursor:grabbing}.particles{position:absolute;inset:0;pointer-events:none;overflow:hidden}.particle{position:absolute;border-radius:50%;background:#ffd36a;opacity:.18;box-shadow:0 0 3px rgba(255,211,106,.25);animation:particleFloat var(--dur) ease-in-out infinite alternate}.day .particle{background:#697476;opacity:.09;box-shadow:none;filter:blur(.55px)}
    .stars,.threads{position:absolute;inset:0}.stars{transition:opacity .35s}.threads{opacity:0;transition:opacity .35s;transform-origin:0 0;will-change:transform}.day .stars{opacity:0;pointer-events:none}.day .threads{opacity:1}.thread-lines{position:absolute;inset:0;width:100%;height:100%;overflow:visible;pointer-events:none}.thread-lines line{stroke:#263238;stroke-width:1.2;opacity:.68;vector-effect:non-scaling-stroke}.thread-lines line.faded{stroke-dasharray:6 6;opacity:.38}
    .star{position:absolute;width:50px;height:50px;transform:translate(-50%,-50%);border:0;background:none;cursor:pointer;display:grid;place-items:center;animation:arrive .55s var(--ease) both}
    .star:before{content:"✦";width:auto;height:auto;color:#8192a0;font-size:14px;line-height:1;text-shadow:0 0 8px rgba(165,171,167,.25);transition:.4s var(--ease);animation:twinkle 2.8s ease-in-out infinite}.star.done:before{color:var(--gold2);font-size:18px;text-shadow:0 0 7px #ffd36a,0 0 20px rgba(255,211,106,.5);animation:twinkleBright 2.4s ease-in-out infinite}.star.expired:before{opacity:.38}
    .star span{position:absolute;top:35px;white-space:nowrap;font-size:11px;letter-spacing:.04em;color:#aeb5b4;opacity:.72}.star.done span{color:#f5dcaf;opacity:.95}
    .star.selected:after{content:"";position:absolute;width:40px;height:40px;border:1px solid rgba(255,217,154,.35);border-radius:50%;animation:ripple 1.7s infinite}
    .node{position:absolute;width:86px;height:86px;border:0;background:none;transform:translate(-50%,-50%);cursor:pointer}.node:before{content:"";position:absolute;inset:8px;border-radius:50%;background:#263238;box-shadow:0 0 0 2px #ecedeb}.node.expired:before{background:#aeb5b5;opacity:.72}.node span{position:absolute;z-index:1;inset:20px 13px;display:grid;place-items:center;font-size:11px;line-height:1.35;color:#f2f0e7}.node.expired span{color:#263238}.node.selected:after{content:"";position:absolute;inset:2px;border:2px solid #f47a24;border-radius:50%}
    .empty{position:absolute;inset:80px 35px auto;text-align:center;color:var(--muted);font-size:13px;line-height:2;display:none}.empty.show{display:block}.empty .orb{width:44px;height:44px;margin:0 auto 15px;border:1px solid currentColor;border-radius:50%;opacity:.25}
    .bottom{position:absolute;z-index:5;left:max(18px,env(safe-area-inset-left));right:max(18px,env(safe-area-inset-right));bottom:calc(12px + env(safe-area-inset-bottom));height:70px;display:flex;align-items:center;gap:8px;padding:0 10px 0 20px;border:1px solid rgba(255,255,255,.12);border-radius:24px;background:rgba(19,29,37,.76);backdrop-filter:blur(18px);box-shadow:0 12px 40px rgba(0,0,0,.25)}
    .day .bottom{background:#fff;border-color:rgba(38,50,56,.12);box-shadow:0 8px 26px rgba(36,42,40,.1)}
    .quick-input{flex:1;min-width:0;height:50px;border:0;background:none;color:inherit;outline:none;font-size:16px}.quick-input::placeholder{color:currentColor;opacity:.4;font-size:14px}
    .add{width:50px;height:50px;border:0;border-radius:50%;background:var(--gold);color:#fff8e7;font-size:29px;line-height:1;cursor:pointer;box-shadow:0 5px 16px rgba(244,122,36,.28);transition:transform .2s}.add:active{transform:scale(.91)}
    .zoom-reset{position:absolute;z-index:4;right:20px;bottom:94px;display:none;border:2px solid #263238;border-radius:18px;padding:7px 11px;background:#ecedeb;color:#263238;font:700 11px/1 ui-sans-serif;box-shadow:2px 3px 0 rgba(38,50,56,.18)}.day .zoom-reset{display:block}
    .sheet-wrap{position:absolute;z-index:9;inset:0;background:rgba(3,9,13,.45);backdrop-filter:blur(5px);opacity:0;pointer-events:none;transition:.3s}.sheet-wrap.open{opacity:1;pointer-events:auto}
    .sheet{position:absolute;left:0;right:0;bottom:0;padding:25px 22px calc(24px + env(safe-area-inset-bottom));border-radius:30px 30px 0 0;background:#f4f0e7;color:#182124;transform:translateY(100%);transition:.45s var(--ease)}.open .sheet{transform:none}.handle{width:38px;height:3px;margin:-11px auto 24px;border-radius:2px;background:#cbc6ba}
    .sheet h2{margin:0;font-size:23px;font-weight:400}.sheet p{font-size:12px;color:#77766f;margin:8px 0 23px}.input-row{display:flex;gap:9px}.input-row input{min-width:0;flex:1;padding:0 16px;height:51px;border:1px solid #d9d4c8;border-radius:16px;background:#fffdf8;outline:none;font-size:16px}.input-row input:focus{border-color:#b99968}.save{width:76px;border:0;border-radius:16px;background:#172126;color:#fff7e9;cursor:pointer}.suggestions{display:flex;gap:8px;overflow:auto;margin-top:15px;padding-bottom:3px}.suggestions button{white-space:nowrap;padding:9px 12px;border:1px solid #d7d1c5;border-radius:14px;background:none;color:#5f625e;font-size:11px;cursor:pointer}
    .actions{position:absolute;z-index:7;left:50%;bottom:99px;transform:translate(-50%,15px);display:flex;gap:7px;padding:7px;border-radius:18px;background:rgba(8,14,18,.82);backdrop-filter:blur(14px);opacity:0;pointer-events:none;transition:.25s}.actions.show{opacity:1;pointer-events:auto;transform:translate(-50%,0)}.day .actions{background:rgba(32,36,35,.88)}.actions button{border:0;border-radius:12px;padding:9px 12px;background:rgba(255,255,255,.08);font-size:11px;cursor:pointer}.actions .shine{color:#ffd693}.toast{position:absolute;z-index:12;left:50%;top:45%;transform:translate(-50%,-50%) scale(.8);padding:13px 18px;border:1px solid rgba(255,220,160,.25);border-radius:18px;background:rgba(13,22,28,.76);backdrop-filter:blur(12px);font-size:12px;letter-spacing:.08em;opacity:0;pointer-events:none}.toast.go{animation:toast 1.8s var(--ease)}
    @keyframes arrive{from{opacity:0;transform:translate(-50%,-40%) scale(.7)}}@keyframes ripple{to{transform:scale(1.6);opacity:0}}@keyframes twinkle{50%{opacity:.45;transform:scale(.72);box-shadow:0 0 4px rgba(165,171,167,.16)}}@keyframes twinkleBright{50%{transform:scale(1.25);box-shadow:0 0 9px #ffd18a,0 0 28px 9px rgba(233,184,109,.34)}}@keyframes particleFloat{to{transform:translate(var(--dx),var(--dy));opacity:.28}}@keyframes toast{15%,70%{opacity:1;transform:translate(-50%,-50%) scale(1)}100%{opacity:0;transform:translate(-50%,-65%) scale(.95)}}
    @media(min-width:900px){html,body{overflow:auto;background:#07131b}body{padding:28px}.app{width:min(480px,100%);height:calc(100dvh - 56px);min-height:600px;margin:auto;border-radius:34px;box-shadow:0 25px 80px #0008}}
  </style>
</head>
<body>
  <main class="app" id="app">
    <section class="shell">
      <header>
        <div class="brand"><div class="brand-mark"></div><div><b>微光集</b><small>LIGHTLET</small></div></div>
        <div class="mode-switch" aria-label="视觉模式"><i class="switch-pill"></i><button id="nightBtn" class="active" aria-label="星夜模式">☾</button><button id="dayBtn" aria-label="脉络模式">⌁</button></div>
      </header>
      <div class="time-filter"><button id="prevDate" aria-label="前一天">‹</button><button class="date" id="date">全部时光</button><button id="nextDate" aria-label="后一天">›</button><button class="all-time" id="allTime">总览</button></div><input type="date" id="datePicker" hidden>
      <div class="canvas" id="canvas"><div class="particles" id="particles"></div><div class="stars" id="stars"></div><div class="threads" id="threads"><svg class="thread-lines" id="threadLines" viewBox="0 0 100 100" preserveAspectRatio="none"></svg></div><button class="zoom-reset" id="zoomReset" aria-label="复位脉络缩放">100%</button><div class="empty" id="empty"><div class="orb"></div><span></span></div></div>
    </section>
    <div class="actions" id="actions"><button class="shine" id="completeAction">点亮</button><button id="archiveAction">收进记录</button><button id="deleteAction">让它离开</button></div>
    <nav class="bottom"><input class="quick-input" id="quickInput" maxlength="20" placeholder="记下一点刚刚发生的微光…"><button class="add" id="addBtn" aria-label="记下一件事">＋</button></nav>
    <div class="sheet-wrap" id="sheet"><div class="sheet"><div class="handle"></div><h2>刚刚，发生了什么？</h2><p>不必是大事。每一点微光，都算数。</p><div class="input-row"><input id="newItem" maxlength="20" placeholder="比如：晒了十分钟太阳" /><button class="save" id="saveBtn">收下</button></div><div class="suggestions"><button>好好吃了饭</button><button>回复了一条消息</button><button>出门走了走</button><button>读了几页书</button></div></div></div>
    <div class="toast" id="toast">✦　又一颗星，被你点亮了</div>
  </main>
  <script>
    const iso=d=>{const x=new Date();x.setDate(x.getDate()+d);return x.toISOString().slice(0,10)};
    const sample=[
      {id:1,text:'给绿萝浇了水',status:'done',date:iso(0)},{id:2,text:'认真吃了早餐',status:'done',date:iso(0)},{id:3,text:'读完一小章',status:'pending',date:iso(0)},{id:4,text:'和妈妈通电话',status:'done',date:iso(-1)},{id:5,text:'整理旧照片',status:'expired',date:iso(-3)},{id:6,text:'给朋友写封信',status:'expired',date:iso(-5)},{id:7,text:'看看那部电影',status:'expired',date:iso(-7)}
    ];
    let items=JSON.parse(localStorage.getItem('lightlet-items')||'null')||sample, mode='night', filterDate=null, selected=null, visibleNodes=[];
    items=items.map(x=>({...x,date:x.date||iso(Number.isFinite(x.day)?x.day:0)}));
    const $=s=>document.querySelector(s),app=$('#app'),canvas=$('#canvas'),stars=$('#stars'),threads=$('#threads'),lines=$('#threadLines');
    const layouts=[[20,20],[66,13],[45,39],[80,48],[17,64],[58,72],[83,84],[34,88],[75,30],[30,52],[55,91]];
    function persist(){localStorage.setItem('lightlet-items',JSON.stringify(items))}
    function current(){return filterDate?items.filter(x=>x.date===filterDate):items}
    function prettyDate(value){return new Intl.DateTimeFormat('zh-CN',{month:'long',day:'numeric',weekday:'short'}).format(new Date(value+'T12:00:00'))}
    function setCopy(){
      $('#date').textContent=filterDate?prettyDate(filterDate):'全部时光';
      $('#allTime').style.opacity=filterDate?'1':'.35';
    }
    function makeParticles(){
      const box=$('#particles');box.innerHTML='';for(let i=0;i<34;i++){const p=document.createElement('i');p.className='particle';const size=1+(i%5)*.65;p.style=`left:${(i*37)%97}%;top:${(i*61)%96}%;width:${size}px;height:${size}px;--dx:${(i%2?1:-1)*(5+i%7)}px;--dy:${-5-i%9}px;--dur:${3.5+i%6}s;animation-delay:${-(i%7)}s`;box.appendChild(p)}
    }
    function render(){
      setCopy();selected=null;$('#actions').classList.remove('show');const list=current();stars.innerHTML='';threads.querySelectorAll('.node').forEach(n=>n.remove());lines.innerHTML='';visibleNodes=[];
      const empty=$('#empty');empty.classList.toggle('show',!list.length);empty.querySelector('span').textContent='这一天还没有记录。慢慢来。';
      list.forEach((item,i)=>{const [x,y]=layouts[i%layouts.length],phase=i*1.37;visibleNodes.push({x,y,phase,item});const b=document.createElement('button');b.className=`star ${item.status}`;b.innerHTML=`<span>${item.text}</span>`;b.onclick=()=>select(item.id,b);stars.appendChild(b);const n=document.createElement('button');n.className=`node ${item.status}`;n.innerHTML=`<span>${item.text}</span>`;n.onclick=()=>select(item.id,n);threads.appendChild(n);visibleNodes[i].star=b;visibleNodes[i].node=n;if(i){const l=document.createElementNS('http://www.w3.org/2000/svg','line');if(item.status==='expired'||list[i-1].status==='expired')l.classList.add('faded');lines.appendChild(l);visibleNodes[i].line=l}});
      animate(performance.now());
    }
    let raf=0;function animate(t){cancelAnimationFrame(raf);visibleNodes.forEach((v,i)=>{const dx=Math.sin(t/2300+v.phase)*1.2,dy=Math.cos(t/2700+v.phase)*1.05;v.cx=v.x+dx;v.cy=v.y+dy;const pos=`left:${v.cx}%;top:${v.cy}%`;v.star.style.cssText=pos;v.node.style.cssText=pos;if(v.line){const a=visibleNodes[i-1];v.line.setAttribute('x1',a.cx);v.line.setAttribute('y1',a.cy);v.line.setAttribute('x2',v.cx);v.line.setAttribute('y2',v.cy)}});raf=requestAnimationFrame(animate)}
    function select(id,el){selected=id;document.querySelectorAll('.selected').forEach(x=>x.classList.remove('selected'));document.querySelectorAll(`[data-id="${id}"]`).forEach(x=>x.classList.add('selected'));el.classList.add('selected');const item=items.find(x=>x.id===id);$('#completeAction').style.display=item.status==='pending'?'block':'none';$('#actions').classList.add('show')}
    function setMode(next){mode=next;app.classList.toggle('day',mode==='day');$('#nightBtn').classList.toggle('active',mode==='night');$('#dayBtn').classList.toggle('active',mode==='day');const color=mode==='day'?'#ecedeb':'#14283a';document.querySelector('meta[name="theme-color"]').content=color;document.documentElement.style.background=color;document.body.style.background=color;setCopy()}
    function shiftDate(delta){const dates=[...new Set(items.map(x=>x.date))].sort();if(!filterDate){filterDate=delta<0?dates.at(-1):dates[0]}else{const i=dates.indexOf(filterDate),next=i+delta;if(next<0||next>=dates.length){filterDate=null}else filterDate=dates[next]}render()}
    $('#nightBtn').onclick=()=>setMode('night');$('#dayBtn').onclick=()=>setMode('day');$('#prevDate').onclick=()=>shiftDate(-1);$('#nextDate').onclick=()=>shiftDate(1);$('#allTime').onclick=()=>{filterDate=null;render()};
    $('#date').onclick=()=>{$('#datePicker').value=filterDate||iso(0);$('#datePicker').showPicker?.()};$('#datePicker').onchange=e=>{filterDate=e.target.value||null;render()};
    $('#addBtn').onclick=()=>{const quick=$('#quickInput').value.trim();if(quick){add(quick);$('#quickInput').value=''}else{$('#sheet').classList.add('open');setTimeout(()=>$('#newItem').focus(),350)}};$('#quickInput').onkeydown=e=>{if(e.key==='Enter')$('#addBtn').click()};
    $('#sheet').onclick=e=>{if(e.target.id==='sheet')$('#sheet').classList.remove('open')};document.querySelectorAll('.suggestions button').forEach(b=>b.onclick=()=>$('#newItem').value=b.textContent);
    function add(text=$('#newItem').value.trim()){if(!text)return;items.push({id:Date.now(),text,status:'pending',date:iso(0)});persist();filterDate=null;$('#newItem').value='';$('#sheet').classList.remove('open');render()}
    $('#saveBtn').onclick=()=>add();$('#newItem').onkeydown=e=>{if(e.key==='Enter')add()};
    $('#completeAction').onclick=()=>{const x=items.find(x=>x.id===selected);if(x)x.status='done';persist();render();const t=$('#toast');t.classList.remove('go');void t.offsetWidth;t.classList.add('go')};
    $('#archiveAction').onclick=()=>{const x=items.find(x=>x.id===selected);if(x)x.status='expired';persist();render()};$('#deleteAction').onclick=()=>{items=items.filter(x=>x.id!==selected);persist();render()};
    const view={scale:1,x:0,y:0},touches=new Map();let gesture=null;
    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    function applyView(){threads.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.scale})`;$('#zoomReset').textContent=Math.round(view.scale*100)+'%'}
    function resetView(){view.scale=1;view.x=0;view.y=0;applyView()}
    function beginGesture(){const pts=[...touches.values()];if(pts.length===1){gesture={kind:'pan',p:{...pts[0]},x:view.x,y:view.y}}else if(pts.length>=2){const [a,b]=pts,mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};gesture={kind:'pinch',distance:Math.hypot(a.x-b.x,a.y-b.y),mid,scale:view.scale,x:view.x,y:view.y}}}
    canvas.addEventListener('pointerdown',e=>{if(mode!=='day'||e.target.closest('#zoomReset'))return;touches.set(e.pointerId,{x:e.clientX,y:e.clientY});canvas.setPointerCapture(e.pointerId);beginGesture()});
    canvas.addEventListener('pointermove',e=>{if(mode!=='day'||!touches.has(e.pointerId))return;touches.set(e.pointerId,{x:e.clientX,y:e.clientY});const pts=[...touches.values()];if(gesture?.kind==='pan'&&pts.length===1){view.x=gesture.x+pts[0].x-gesture.p.x;view.y=gesture.y+pts[0].y-gesture.p.y}else if(pts.length>=2){if(gesture?.kind!=='pinch')beginGesture();const [a,b]=pts,mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2},next=clamp(gesture.scale*Math.hypot(a.x-b.x,a.y-b.y)/gesture.distance,.65,2.6),ratio=next/gesture.scale;view.x=mid.x-(gesture.mid.x-gesture.x)*ratio;view.y=mid.y-(gesture.mid.y-gesture.y)*ratio;view.scale=next}applyView()});
    const endPointer=e=>{touches.delete(e.pointerId);beginGesture()};canvas.addEventListener('pointerup',endPointer);canvas.addEventListener('pointercancel',endPointer);
    canvas.addEventListener('wheel',e=>{if(mode!=='day')return;e.preventDefault();const rect=canvas.getBoundingClientRect(),cx=e.clientX-rect.left,cy=e.clientY-rect.top,old=view.scale,next=clamp(old*(e.deltaY<0?1.1:.9),.65,2.6),ratio=next/old;view.x=cx-(cx-view.x)*ratio;view.y=cy-(cy-view.y)*ratio;view.scale=next;applyView()},{passive:false});
    $('#zoomReset').onclick=e=>{e.stopPropagation();resetView()};canvas.addEventListener('dblclick',()=>{if(mode==='day')resetView()});
    function syncViewport(){const h=window.visualViewport?.height||window.innerHeight;document.documentElement.style.setProperty('--app-height',`${Math.round(h)}px`)}
    syncViewport();window.visualViewport?.addEventListener('resize',syncViewport);window.addEventListener('orientationchange',()=>setTimeout(syncViewport,100));
    makeParticles();resetView();render();
  </script>
</body>
</html>
