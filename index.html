    $('#nightBtn').onclick=()=>setMode('night');$('#dayBtn').onclick=()=>setMode('day');$('#prevDate').onclick=()=>shiftDate(-1);$('#nextDate').onclick=()=>shiftDate(1);$('#allTime').onclick=()=>{filterDate=null;pulseDateView();render()};
    $('#date').onclick=()=>{$('#datePicker').value=filterDate||iso(0);$('#datePicker').showPicker?.()};$('#datePicker').onchange=e=>{filterDate=e.target.value||null;pulseDateView();render()};
    $('#addBtn').onclick=()=>{const quick=$('#quickInput').value.trim();if(quick){add(quick);$('#quickInput').value=''}else{$('#sheet').classList.add('open');setTimeout(()=>$('#newItem').focus(),350)}};$('#quickInput').onkeydown=e=>{if(e.key==='Enter')$('#addBtn').click()};
    $('#sheet').onclick=e=>{if(e.target.id==='sheet')$('#sheet').classList.remove('open')};document.querySelectorAll('.suggestions button').forEach(b=>b.onclick=()=>$('#newItem').value=b.textContent);
    function add(text=$('#newItem').value.trim()){if(!text)return;items.push({id:Date.now(),text,status:'pending',date:iso(0)});persist();filterDate=null;$('#newItem').value='';$('#sheet').classList.remove('open');render()}
    $('#saveBtn').onclick=()=>add();$('#newItem').onkeydown=e=>{if(e.key==='Enter')add()};
    function saveDetailNote(){const x=items.find(x=>x.id===selected);if(x)x.note=$('#detailNote').value.trim();return x}
    $('#completeAction').onclick=()=>{const x=saveDetailNote();if(x)x.status='done';persist();render();const t=$('#toast');t.classList.remove('go');void t.offsetWidth;t.classList.add('go')};
    $('#archiveAction').onclick=()=>{const x=saveDetailNote();if(x)x.status='expired';persist();render()};$('#deleteAction').onclick=()=>{items=items.filter(x=>x.id!==selected);persist();render()};
    $('#detailClose').onclick=closeDetail;$('#detailSave').onclick=()=>{saveDetailNote();persist();closeDetail()};$('#detailNote').addEventListener('keydown',e=>{if((e.metaKey||e.ctrlKey)&&e.key==='Enter')$('#detailSave').click()});
    let journalDate=iso(0),journalSelected=new Set(),journalTouchX=0;
    function renderJournal(){const list=items.filter(x=>x.date===journalDate),box=$('#journalList');$('#journalDate').textContent=prettyDate(journalDate);box.innerHTML='';if(!list.length){const empty=document.createElement('div');empty.className='journal-empty';empty.textContent='这一页还是空白的。';box.appendChild(empty)}list.forEach(item=>{const row=document.createElement('label');row.className='journal-row';const input=document.createElement('input');input.type='checkbox';input.checked=journalSelected.has(item.id);const check=document.createElement('i');check.className='checkmark';const text=document.createElement('span');text.textContent=item.text;const status=document.createElement('i');status.className=`journal-status ${item.status}`;input.onchange=()=>{input.checked?journalSelected.add(item.id):journalSelected.delete(item.id);$('#selectedCount').textContent=`已选 ${journalSelected.size} 项`};row.append(input,check,text,status);box.appendChild(row)});$('#selectedCount').textContent=`已选 ${journalSelected.size} 项`}
    function shiftJournalDate(delta){const day=new Date(journalDate+'T12:00:00');day.setDate(day.getDate()+delta);journalDate=day.toISOString().slice(0,10);journalSelected.clear();renderJournal()}
    $('#listOpen').onclick=()=>{journalDate=filterDate||iso(0);journalSelected.clear();renderJournal();$('#journalOverlay').classList.add('open')};$('#journalClose').onclick=()=>$('#journalOverlay').classList.remove('open');$('#journalOverlay').onclick=e=>{if(e.target.id==='journalOverlay')e.currentTarget.classList.remove('open')};$('#journalPrev').onclick=()=>shiftJournalDate(-1);$('#journalNext').onclick=()=>shiftJournalDate(1);
    $('#journal').addEventListener('touchstart',e=>journalTouchX=e.changedTouches[0].clientX,{passive:true});$('#journal').addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-journalTouchX;if(Math.abs(dx)>55)shiftJournalDate(dx>0?-1:1)},{passive:true});
    document.querySelectorAll('[data-batch]').forEach(button=>button.onclick=()=>{if(!journalSelected.size)return;const action=button.dataset.batch;if(action==='delete')items=items.filter(x=>!journalSelected.has(x.id));else items.forEach(x=>{if(journalSelected.has(x.id))x.status=action});journalSelected.clear();persist();renderJournal();render()});
    const view={scale:1,x:0,y:0},touches=new Map();let gesture=null;
    const clamp=(n,a,b)=>Math.max(a,Math.min(b,n));
    function applyView(){threads.style.transform=`translate(${view.x}px,${view.y}px) scale(${view.scale})`;$('#zoomReset').textContent=view.scale===1&&view.x===0&&view.y===0?'全景':'复位'}
    function resetView(){view.scale=1;view.x=0;view.y=0;applyView()}
    function beginGesture(){const pts=[...touches.values()];if(pts.length===1){gesture={kind:'pan',p:{...pts[0]},x:view.x,y:view.y}}else if(pts.length>=2){const [a,b]=pts,mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};gesture={kind:'pinch',distance:Math.hypot(a.x-b.x,a.y-b.y),mid,scale:view.scale,x:view.x,y:view.y}}}
    canvas.addEventListener('pointerdown',e=>{if(mode!=='day'||e.target.closest('#zoomReset,.node'))return;threads.classList.add('interacting');touches.set(e.pointerId,{x:e.clientX,y:e.clientY});canvas.setPointerCapture(e.pointerId);beginGesture()});
    canvas.addEventListener('pointermove',e=>{if(mode!=='day'||!touches.has(e.pointerId))return;touches.set(e.pointerId,{x:e.clientX,y:e.clientY});const pts=[...touches.values()];if(gesture?.kind==='pan'&&pts.length===1){view.x=gesture.x+pts[0].x-gesture.p.x;view.y=gesture.y+pts[0].y-gesture.p.y}else if(pts.length>=2){if(gesture?.kind!=='pinch')beginGesture();const [a,b]=pts,mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2},next=clamp(gesture.scale*Math.hypot(a.x-b.x,a.y-b.y)/gesture.distance,.65,2.6),ratio=next/gesture.scale;view.x=mid.x-(gesture.mid.x-gesture.x)*ratio;view.y=mid.y-(gesture.mid.y-gesture.y)*ratio;view.scale=next}applyView()});
    const endPointer=e=>{touches.delete(e.pointerId);if(!touches.size)threads.classList.remove('interacting');beginGesture()};canvas.addEventListener('pointerup',endPointer);canvas.addEventListener('pointercancel',endPointer);
    canvas.addEventListener('wheel',e=>{if(mode!=='day')return;e.preventDefault();const rect=canvas.getBoundingClientRect(),cx=e.clientX-rect.left,cy=e.clientY-rect.top,old=view.scale,next=clamp(old*(e.deltaY<0?1.1:.9),.65,2.6),ratio=next/old;view.x=cx-(cx-view.x)*ratio;view.y=cy-(cy-view.y)*ratio;view.scale=next;applyView()},{passive:false});
    $('#zoomReset').onclick=e=>{e.stopPropagation();resetView()};canvas.addEventListener('dblclick',()=>{if(mode==='day')resetView()});
    let audioCtx=null,masterGain=null,trackBus=null,soundMode='lofi',soundMuted=true,soundTimers=[],soundSources=[];
    function makeNoise(seconds=2){const length=Math.floor(audioCtx.sampleRate*seconds),buffer=audioCtx.createBuffer(1,length,audioCtx.sampleRate),data=buffer.getChannelData(0);for(let i=0;i<length;i++)data[i]=Math.random()*2-1;return buffer}
    function rememberSource(source){soundSources.push(source);return source}
    function initAudio(){if(audioCtx)return;audioCtx=new(window.AudioContext||window.webkitAudioContext)();masterGain=audioCtx.createGain();masterGain.gain.value=0;masterGain.connect(audioCtx.destination);startSoundscape()}
    function clearSoundscape(){soundTimers.forEach(clearInterval);soundTimers=[];soundSources.forEach(source=>{try{source.stop?.()}catch{}try{source.disconnect?.()}catch{}});soundSources=[];try{trackBus?.disconnect()}catch{}trackBus=null}
    function createBus(level){trackBus=audioCtx.createGain();trackBus.gain.value=level;trackBus.connect(masterGain);return trackBus}
    function playTone(frequency,start,duration,level=.025,type='triangle',destination=trackBus){const osc=rememberSource(audioCtx.createOscillator()),gain=audioCtx.createGain();osc.type=type;osc.frequency.value=frequency;gain.gain.setValueAtTime(.0001,start);gain.gain.exponentialRampToValueAtTime(level,start+.08);gain.gain.exponentialRampToValueAtTime(.0001,start+duration);osc.connect(gain).connect(destination);osc.start(start);osc.stop(start+duration+.05)}
    function startLofi(){const bus=createBus(.72),filter=audioCtx.createBiquadFilter();filter.type='lowpass';filter.frequency.value=1650;filter.Q.value=.5;filter.connect(bus);const hiss=rememberSource(audioCtx.createBufferSource()),hissGain=audioCtx.createGain();hiss.buffer=makeNoise(3);hiss.loop=true;hissGain.gain.value=.011;hiss.connect(hissGain).connect(filter);hiss.start();const chords=[[174.61,220,261.63],[146.83,196,246.94],[130.81,174.61,220],[164.81,207.65,246.94]];let step=0;const phrase=()=>{const now=audioCtx.currentTime+.04,chord=chords[step++%chords.length];chord.forEach((f,i)=>playTone(f,now+i*.035,3.8,.018,'triangle',filter));playTone(chord[1]*2,now+.75,1.5,.012,'sine',filter);playTone(chord[2]*2,now+2.2,1.2,.01,'sine',filter)};const beat=()=>{const now=audioCtx.currentTime+.02,osc=rememberSource(audioCtx.createOscillator()),gain=audioCtx.createGain();osc.frequency.setValueAtTime(92,now);osc.frequency.exponentialRampToValueAtTime(48,now+.16);gain.gain.setValueAtTime(.03,now);gain.gain.exponentialRampToValueAtTime(.0001,now+.2);osc.connect(gain).connect(filter);osc.start(now);osc.stop(now+.22)};phrase();soundTimers.push(setInterval(phrase,4000),setInterval(beat,2000))}
    function startSummerNight(){const bus=createBus(.48),warm=audioCtx.createBiquadFilter();warm.type='bandpass';warm.frequency.value=650;warm.Q.value=.4;const fire=rememberSource(audioCtx.createBufferSource()),fireGain=audioCtx.createGain();fire.buffer=makeNoise(4);fire.loop=true;fireGain.gain.value=.02;fire.connect(warm).connect(fireGain).connect(bus);fire.start();const crackle=()=>{const now=audioCtx.currentTime+.01,source=rememberSource(audioCtx.createBufferSource()),filter=audioCtx.createBiquadFilter(),gain=audioCtx.createGain();source.buffer=makeNoise(.07);filter.type='highpass';filter.frequency.value=1700+Math.random()*1300;gain.gain.setValueAtTime(.0001,now);gain.gain.linearRampToValueAtTime(.006+Math.random()*.012,now+.012);gain.gain.exponentialRampToValueAtTime(.0001,now+.065);source.connect(filter).connect(gain).connect(bus);source.start(now);source.stop(now+.08)};const cicada=()=>{const now=audioCtx.currentTime+.04,duration=.5+Math.random()*.5,osc=rememberSource(audioCtx.createOscillator()),lfo=rememberSource(audioCtx.createOscillator()),lfoGain=audioCtx.createGain(),gain=audioCtx.createGain(),high=audioCtx.createBiquadFilter();osc.type='sawtooth';osc.frequency.value=4200+Math.random()*800;lfo.frequency.value=18+Math.random()*7;lfoGain.gain.value=.004;gain.gain.setValueAtTime(.0001,now);gain.gain.linearRampToValueAtTime(.005,now+.15);gain.gain.exponentialRampToValueAtTime(.0001,now+duration);high.type='highpass';high.frequency.value=3200;lfo.connect(lfoGain).connect(gain.gain);osc.connect(gain).connect(high).connect(bus);osc.start(now);lfo.start(now);osc.stop(now+duration+.05);lfo.stop(now+duration+.05)};const scheduleCrackle=()=>{const id=setTimeout(()=>{soundTimers=soundTimers.filter(x=>x!==id);crackle();scheduleCrackle()},2200+Math.random()*4300);soundTimers.push(id)};scheduleCrackle();soundTimers.push(setInterval(cicada,6800));cicada()}
    function startSoundscape(){clearSoundscape();soundMode==='lofi'?startLofi():startSummerNight();updateSoundUI()}
    async function wakeAudio(){initAudio();if(audioCtx.state==='suspended')await audioCtx.resume()}
    function updateSoundUI(){$('#soundMode').textContent=soundMode==='lofi'?'LOFI':'夏夜';$('#soundMode').classList.toggle('night-sound',soundMode==='night');$('#muteSound').classList.toggle('muted',soundMuted);$('#soundState').textContent=soundMuted?'▶':'Ⅱ';$('#muteSound').setAttribute('aria-label',soundMuted?'播放背景声音':'暂停背景声音')}
    $('#soundMode').onclick=async()=>{await wakeAudio();soundMode=soundMode==='lofi'?'night':'lofi';soundMuted=false;masterGain.gain.setTargetAtTime(.8,audioCtx.currentTime,.12);startSoundscape()};
    $('#muteSound').onclick=async()=>{await wakeAudio();soundMuted=!soundMuted;masterGain.gain.setTargetAtTime(soundMuted?0:.8,audioCtx.currentTime,.12);updateSoundUI()};
    function syncViewport(){const h=window.visualViewport?.height||window.innerHeight;document.documentElement.style.setProperty('--app-height',`${Math.round(h)}px`);requestAnimationFrame(syncFire)}
    function syncFire(){const w=app.clientWidth,h=app.clientHeight,iw=941,ih=1672,scale=Math.max(w/iw,h/ih),cropX=(iw*scale-w)/2,cropY=ih*scale-h;app.style.setProperty('--fire-x',`${491*scale-cropX}px`);app.style.setProperty('--fire-y',`${1408*scale-cropY}px`)}
    syncViewport();window.visualViewport?.addEventListener('resize',syncViewport);window.addEventListener('orientationchange',()=>setTimeout(syncViewport,100));
    makeParticles();resetView();render();
