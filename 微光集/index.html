<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>微光集</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; overflow: hidden; }
  body {
    background: #0f0e17;
    color: #e6dfcc;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "PingFang SC", sans-serif;
  }
  .app {
    display: flex;
    flex-direction: column;
    height: 100dvh;
    max-width: 480px;
    margin: 0 auto;
    position: relative;
  }
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 20px 6px;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 20px;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: #d4a853;
  }
  .header .date {
    font-size: 13px;
    color: #8a8a8a;
  }
  .star-container {
    flex: 1;
    position: relative;
    min-height: 0;
  }
  .star-container canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
  }
  .info-card {
    position: absolute;
    z-index: 10;
    opacity: 0;
    transform: translateY(6px) scale(0.96);
    transition: opacity 0.2s ease, transform 0.2s ease;
    pointer-events: none;
  }
  .info-card.show {
    opacity: 1;
    transform: translateY(0) scale(1);
    pointer-events: auto;
  }
  .info-card-inner {
    background: rgba(20,18,28,0.95);
    border: 1px solid rgba(212,168,83,0.25);
    border-radius: 14px;
    padding: 14px 16px;
    min-width: 180px;
    max-width: 240px;
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 1px rgba(212,168,83,0.15);
  }
  .card-text {
    font-size: 15px;
    color: #e6dfcc;
    line-height: 1.4;
    margin-bottom: 8px;
    word-break: break-word;
  }
  .card-meta {
    font-size: 11px;
    color: #6a6a6a;
    margin-bottom: 12px;
    display: flex;
    gap: 10px;
  }
  .card-meta span { display: flex; align-items: center; gap: 3px; }
  .card-actions {
    display: flex;
    gap: 8px;
  }
  .card-btn {
    flex: 1;
    padding: 7px 0;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-align: center;
  }
  .card-btn.primary {
    background: rgba(212,168,83,0.15);
    color: #d4a853;
    border: 1px solid rgba(212,168,83,0.2);
  }
  .card-btn.primary:active { background: rgba(212,168,83,0.25); }
  .card-btn.danger {
    background: transparent;
    color: #5a4a4a;
    border: 1px solid rgba(255,255,255,0.06);
  }
  .card-btn.danger:active { color: #d44; border-color: rgba(255,80,60,0.2); }
  .input-bar {
    display: flex;
    gap: 10px;
    padding: 12px 20px 20px;
    flex-shrink: 0;
    padding-bottom: calc(12px + env(safe-area-inset-bottom, 0px));
  }
  .input-bar input {
    flex: 1;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
    border-radius: 12px;
    padding: 12px 16px;
    color: #e6dfcc;
    font-size: 15px;
    outline: none;
    transition: border-color 0.3s;
  }
  .input-bar input:focus { border-color: rgba(212,168,83,0.4); }
  .input-bar input::placeholder { color: #4a4a4a; }
  .input-bar button {
    background: rgba(212,168,83,0.12);
    border: 1px solid rgba(212,168,83,0.2);
    color: #d4a853;
    padding: 12px 18px;
    border-radius: 12px;
    font-size: 15px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .input-bar button:active { background: rgba(212,168,83,0.22); }
  .hint {
    position: absolute;
    bottom: 50%;
    left: 50%;
    transform: translate(-50%, 50%);
    color: #3a3a3a;
    font-size: 14px;
    text-align: center;
    z-index: 5;
    pointer-events: none;
    transition: opacity 0.5s;
  }
  .stats-float {
    position: absolute;
    bottom: 12px;
    left: 20px;
    font-size: 12px;
    color: #4a4a4a;
    z-index: 5;
    pointer-events: none;
  }
  .stats-float strong { color: #d4a853; font-weight: 500; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>微光集</h1>
    <span class="date" id="todayDate"></span>
  </div>
  <div class="star-container" id="starContainer">
    <canvas id="starfield"></canvas>
    <div class="hint" id="hint">添加第一颗微光吧</div>
    <div class="stats-float" id="statsFloat"></div>
    <div class="info-card" id="infoCard">
      <div class="info-card-inner">
        <div class="card-text" id="cardText"></div>
        <div class="card-meta" id="cardMeta"></div>
        <div class="card-actions">
          <button class="card-btn primary" id="cardToggle">点亮</button>
          <button class="card-btn danger" id="cardDelete">删除</button>
        </div>
      </div>
    </div>
  </div>
  <div class="input-bar">
    <input type="text" id="input" placeholder="添加一件事…" maxlength="80" autocomplete="off" enterkeyhint="done">
    <button id="addBtn">+ 微光</button>
  </div>
</div>

<script src="../js/utils.js"></script>
<script src="../js/db.js"></script>
<script src="../js/api.js"></script>
<script src="../js/starfield.js"></script>

<script>
var API = LightletAPI;
var U = LightletUtils;
var SF = StarField;

var canvas, container;
var currentCardId = null;

API.init().then(function () {
  container = document.getElementById('starContainer');
  canvas = document.getElementById('starfield');
  SF.init(canvas, []);
  refresh();
  setupEvents();
  document.getElementById('todayDate').textContent = U.displayDate();
});

function refresh() {
  return API.getToday().then(function (lights) {
    SF.update(lights);
    updateHint(lights);
    updateStats(lights);
  });
}

function updateHint(lights) {
  var hint = document.getElementById('hint');
  if (!lights.length) {
    hint.style.opacity = '1';
    hint.textContent = '添加第一颗微光吧';
  } else if (lights.every(function (l) { return l.status === 'done'; })) {
    hint.style.opacity = '0.6';
    hint.textContent = '今天的星空已经点亮';
  } else {
    hint.style.opacity = '0';
  }
}

function updateStats(lights) {
  var done = lights.filter(function (l) { return l.status === 'done'; }).length;
  var el = document.getElementById('statsFloat');
  el.innerHTML = '已点亮 <strong>' + done + '</strong> / ' + lights.length;
}

function setupEvents() {
  canvas.addEventListener('click', function (e) {
    var rect = canvas.getBoundingClientRect();
    var x = e.clientX - rect.left;
    var y = e.clientY - rect.top;
    var hit = SF.hitTest(x, y);
    if (hit) {
      showCard(hit);
    } else {
      hideCard();
    }
  });

  document.getElementById('cardToggle').addEventListener('click', function () {
    if (!currentCardId) return;
    var toggleBtn = document.getElementById('cardToggle');
    var isDone = toggleBtn.textContent === '取消点亮';
    var op = isDone ? API.uncomplete(currentCardId) : API.complete(currentCardId);
    op.then(function (updated) {
      if (updated.status === 'done') {
        var pos = SF.getPos(currentCardId);
        if (pos) SF.addBurst(pos.x, pos.y);
      }
      refresh().then(function () {
        reopenCard(currentCardId);
      });
    });
  });

  document.getElementById('cardDelete').addEventListener('click', function () {
    if (!currentCardId) return;
    API.deleteLight(currentCardId).then(function () {
      hideCard();
      refresh();
    });
  });

  document.getElementById('addBtn').addEventListener('click', addLight);
  document.getElementById('input').addEventListener('keydown', function (e) {
    if (e.key === 'Enter') addLight();
  });

  var resizeTimer;
  window.addEventListener('resize', function () {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(function () {
      SF.resize();
      if (currentCardId) reopenCard(currentCardId);
    }, 200);
  });
}

function addLight() {
  var input = document.getElementById('input');
  var text = input.value.trim();
  if (!text) return;
  API.add(text).then(function () {
    input.value = '';
    refresh();
  });
}

function showCard(hit) {
  currentCardId = hit.id;
  var light = hit.light;
  var card = document.getElementById('infoCard');
  document.getElementById('cardText').textContent = light.text;
  document.getElementById('cardMeta').innerHTML =
    '<span>创建 ' + U.timeStr(light.createdAt) + '</span>' +
    (light.completedAt ? '<span>完成 ' + U.timeStr(light.completedAt) + '</span>' : '');
  var toggleBtn = document.getElementById('cardToggle');
  toggleBtn.textContent = light.status === 'done' ? '取消点亮' : '点亮';
  positionCard(hit.x, hit.y);
  card.classList.add('show');
}

function reopenCard(lightId) {
  API.getToday().then(function (lights) {
    var light = lights.find(function (l) { return l.id === lightId; });
    if (!light) return;
    var pos = SF.getPos(lightId);
    if (!pos) return;
    showCard({ id: lightId, x: pos.x, y: pos.y, light: light });
  });
}

function hideCard() {
  currentCardId = null;
  document.getElementById('infoCard').classList.remove('show');
}

function positionCard(starX, starY) {
  var card = document.getElementById('infoCard');
  var inner = card.querySelector('.info-card-inner');
  var rect = container.getBoundingClientRect();
  card.style.visibility = 'hidden';
  card.classList.add('show');
  var cw = inner.offsetWidth;
  var ch = inner.offsetHeight;
  card.classList.remove('show');
  card.style.visibility = '';
  var gap = 16;
  var left = starX - cw / 2;
  var top = starY - ch - gap;
  if (top < 8) top = starY + gap;
  if (left < 8) left = 8;
  if (left + cw > rect.width - 8) left = rect.width - cw - 8;
  card.style.left = left + 'px';
  card.style.top = top + 'px';
}
</script>
</body>
</html>
